<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Fridge Poetry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Inter', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactive-ui { pointer-events: auto; }
        
        /* Custom UI Styling */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
        }
        
        button { transition: all 0.2s ease; }
        button:hover { transform: translateY(-2px); }
        button:active { transform: translateY(1px); }
    </style>
</head>
<body>

    <div id="ui-layer" class="flex flex-col justify-between p-6">
        <div class="flex justify-between items-start">
            <div class="glass-panel p-4 interactive-ui shadow-lg">
                <h1 class="text-white text-xl font-bold mb-2 tracking-wide">Magic Fridge</h1>
                <p class="text-gray-300 text-sm mb-4">Click the fridge to zoom in.<br>Drag words to write poetry.</p>
                <div class="flex flex-col gap-2">
                    <p class="text-xs text-gray-400 uppercase font-semibold tracking-wider">Lighting</p>
                    <div class="flex gap-2">
                        <button onclick="setLighting('morning')" class="bg-amber-600/80 hover:bg-amber-500 text-white px-3 py-1.5 rounded text-sm shadow">🌅 Morning</button>
                        <button onclick="setLighting('day')" class="bg-blue-500/80 hover:bg-blue-400 text-white px-3 py-1.5 rounded text-sm shadow">☀️ Day</button>
                        <button onclick="setLighting('evening')" class="bg-purple-600/80 hover:bg-purple-500 text-white px-3 py-1.5 rounded text-sm shadow">🌇 Eve</button>
                        <button onclick="setLighting('night')" class="bg-indigo-900/80 hover:bg-indigo-800 text-white px-3 py-1.5 rounded text-sm shadow">🌙 Night</button>
                    </div>
                </div>
            </div>
            
            <button id="reset-view-btn" onclick="resetCamera()" class="glass-panel px-6 py-3 interactive-ui shadow-lg text-white font-semibold hidden bg-white/20 hover:bg-white/30 border-white/40 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                Step Back
            </button>
        </div>
        
        <div id="instructions" class="self-center glass-panel px-6 py-3 text-white text-center opacity-0 transition-opacity duration-1000">
            Click the 🎭 button to generate a Poetry Slam!
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- Core Variables ---
        let scene, camera, renderer, controls;
        let ambientLight, directionalLight, fillLight, windowLight;
        
        // Interaction variables
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isZoomedIn = false;
        
        // Dragging variables
        let draggedMagnet = null;
        let dragOffset = new THREE.Vector3();
        let dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0); // Will be updated to fridge surface
        
        // Object groups
        const magnets = [];
        let slamButton = null;
        let fridgeDoorMesh = null;

        // Word Bank
        const words = [
            "the", "a", "is", "of", "and", "to", "in", "you", "I", "it", 
            "that", "was", "for", "on", "are", "with", "as", "my", "his", "they",
            "hot", "cold", "dog", "cat", "love", "hate", "magic", "fridge", "midnight", "snack",
            "dream", "sleep", "dance", "whisper", "shadow", "light", "coffee", "always", "never", "why",
            "stars", "kitchen", "ghost", "breathe", "slow", "fast", "beautiful", "broken", "time", "machine"
        ];

        // --- Initialization ---
        function init() {
            const container = document.getElementById('canvas-container');

            // Scene setup
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x1a1a1a, 0.02); // Cozy depth

            // Camera setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 15);

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);

            // Controls setup
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below floor
            controls.minDistance = 5;
            controls.maxDistance = 25;
            controls.target.set(0, 3, 0);

            // Build Scene
            setupLighting();
            buildKitchen();
            createFridgeMagnets();
            setLighting('evening'); // Default

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('pointerdown', onPointerDown);
            renderer.domElement.addEventListener('pointermove', onPointerMove);
            renderer.domElement.addEventListener('pointerup', onPointerUp);

            // Start Loop
            animate();
        }

        // --- STREAMING_CHUNK:Building the environment... ---
        function buildKitchen() {
            // Materials
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.8 }); // Dark wood
            const wallMat = new THREE.MeshStandardMaterial({ color: 0xe0e5ec, roughness: 0.9 }); // Off-white
            const counterMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2 }); // Black granite
            const cabinetMat = new THREE.MeshStandardMaterial({ color: 0x4a69bd, roughness: 0.6 }); // Blue cabinets
            const fridgeMat = new THREE.MeshStandardMaterial({ color: 0xf5f6fa, roughness: 0.4, metalness: 0.1 }); // White fridge
            const windowMat = new THREE.MeshBasicMaterial({ color: 0xeef2ff }); // Glowing window

            // Floor
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Walls
            const backWall = new THREE.Mesh(new THREE.BoxGeometry(30, 15, 1), wallMat);
            backWall.position.set(0, 7.5, -6);
            backWall.receiveShadow = true;
            scene.add(backWall);

            const leftWall = new THREE.Mesh(new THREE.BoxGeometry(1, 15, 30), wallMat);
            leftWall.position.set(-10, 7.5, 0);
            leftWall.receiveShadow = true;
            scene.add(leftWall);

            // Window
            const windowMesh = new THREE.Mesh(new THREE.PlaneGeometry(6, 4), windowMat);
            windowMesh.position.set(-5, 6, -5.4);
            scene.add(windowMesh);

            // Counters & Cabinets
            const counter = new THREE.Mesh(new THREE.BoxGeometry(12, 3, 3), cabinetMat);
            counter.position.set(-4, 1.5, -4);
            counter.castShadow = true;
            counter.receiveShadow = true;
            scene.add(counter);

            const counterTop = new THREE.Mesh(new THREE.BoxGeometry(12.2, 0.2, 3.2), counterMat);
            counterTop.position.set(-4, 3.1, -4);
            counterTop.castShadow = true;
            counterTop.receiveShadow = true;
            scene.add(counterTop);

            // The Fridge (Centerpiece)
            const fridgeGroup = new THREE.Group();
            fridgeGroup.position.set(4, 0, -3.5);
            scene.add(fridgeGroup);

            const fridgeBody = new THREE.Mesh(new THREE.BoxGeometry(3.5, 8, 3), fridgeMat);
            fridgeBody.position.y = 4;
            fridgeBody.castShadow = true;
            fridgeBody.receiveShadow = true;
            fridgeGroup.add(fridgeBody);

            // Fridge Door (The Canvas)
            fridgeDoorMesh = new THREE.Mesh(new THREE.BoxGeometry(3.6, 7.8, 0.2), fridgeMat);
            fridgeDoorMesh.position.set(0, 4, 1.55); // Slightly protruding forward
            fridgeDoorMesh.receiveShadow = true;
            fridgeDoorMesh.userData.isFridgeDoor = true;
            fridgeGroup.add(fridgeDoorMesh);
            
            // Handle (Decorative)
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 2, 8), new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 0.8, roughness: 0.2}));
            handle.position.set(-1.4, 4, 1.75);
            fridgeGroup.add(handle);

            // Define the invisible plane for dragging exactly on the door surface
            // The door front is at z = -3.5 (fridge z) + 1.55 (door local z) + 0.1 (half depth) = -1.85
            const doorWorldZ = fridgeGroup.position.z + fridgeDoorMesh.position.z + 0.1;
            dragPlane.setComponents(0, 0, 1, -doorWorldZ - 0.02); // slight offset to prevent clipping

            // Clutter (Plant, Mug)
            createClutter();
        }

        function createClutter() {
            // Simple mug
            const mug = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.4, 16), new THREE.MeshStandardMaterial({color: 0xff4757}));
            mug.position.set(-2, 3.4, -3.5);
            mug.castShadow = true;
            scene.add(mug);

            // Simple plant pot
            const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.3, 0.6, 16), new THREE.MeshStandardMaterial({color: 0xcd6133}));
            pot.position.set(-7, 3.5, -4);
            pot.castShadow = true;
            scene.add(pot);
            
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(0.6, 8, 8), new THREE.MeshStandardMaterial({color: 0x2ed573}));
            leaves.position.set(-7, 4.2, -4);
            leaves.castShadow = true;
            scene.add(leaves);
        }

        // --- STREAMING_CHUNK:Setting up lighting profiles... ---
        function setupLighting() {
            ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);

            directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            directionalLight.shadow.camera.near = 0.5;
            directionalLight.shadow.camera.far = 25;
            directionalLight.shadow.camera.left = -10;
            directionalLight.shadow.camera.right = 10;
            directionalLight.shadow.camera.top = 10;
            directionalLight.shadow.camera.bottom = -10;
            directionalLight.shadow.bias = -0.001;
            scene.add(directionalLight);

            fillLight = new THREE.PointLight(0xffffff, 0.5, 20);
            fillLight.position.set(0, 5, 2);
            scene.add(fillLight);

            windowLight = new THREE.RectAreaLight(0xffffff, 2, 6, 4);
            windowLight.position.set(-5, 6, -5.3);
            windowLight.lookAt(-5, 0, 0);
            scene.add(windowLight);
        }

        function setLighting(time) {
            gsap.killTweensOf([ambientLight.color, directionalLight.color, directionalLight, fillLight.color, fillLight, scene.fog.color]);

            const duration = 1.5;
            let aColor, dColor, fColor, fogColor, dInt, fInt;

            switch(time) {
                case 'morning':
                    aColor = new THREE.Color(0xffeaa7); dColor = new THREE.Color(0xffdac1); fColor = new THREE.Color(0xffb8b8); fogColor = new THREE.Color(0x3a302a);
                    dInt = 1.2; fInt = 0.6;
                    gsap.to(directionalLight.position, {x: -8, y: 4, z: 8, duration});
                    break;
                case 'day':
                    aColor = new THREE.Color(0xffffff); dColor = new THREE.Color(0xffffff); fColor = new THREE.Color(0xe0e0ff); fogColor = new THREE.Color(0x2a2a2a);
                    dInt = 1.5; fInt = 0.8;
                    gsap.to(directionalLight.position, {x: 2, y: 12, z: 4, duration});
                    break;
                case 'evening':
                    aColor = new THREE.Color(0x6c5ce7); dColor = new THREE.Color(0xfdcb6e); fColor = new THREE.Color(0xd63031); fogColor = new THREE.Color(0x1a1515);
                    dInt = 0.8; fInt = 0.5;
                    gsap.to(directionalLight.position, {x: 8, y: 3, z: 6, duration});
                    break;
                case 'night':
                    aColor = new THREE.Color(0x0984e3); dColor = new THREE.Color(0x74b9ff); fColor = new THREE.Color(0x00cec9); fogColor = new THREE.Color(0x050510);
                    dInt = 0.2; fInt = 0.3; // Rely more on fill/ambient
                    gsap.to(directionalLight.position, {x: 0, y: 10, z: 0, duration});
                    break;
            }

            // Animate colors
            gsap.to(ambientLight.color, { r: aColor.r, g: aColor.g, b: aColor.b, duration });
            gsap.to(directionalLight.color, { r: dColor.r, g: dColor.g, b: dColor.b, duration });
            gsap.to(fillLight.color, { r: fColor.r, g: fColor.g, b: fColor.b, duration });
            gsap.to(scene.fog.color, { r: fogColor.r, g: fogColor.g, b: fogColor.b, duration });
            
            // Animate intensities
            gsap.to(directionalLight, { intensity: dInt, duration });
            gsap.to(fillLight, { intensity: fInt, duration });
        }

        // --- STREAMING_CHUNK:Generating poetry magnets via Canvas API... ---
        function createWordTexture(word) {
            const canvas = document.createElement('canvas');
            // Size dynamically based on word length
            const charWidth = 24;
            const padding = 30;
            canvas.width = Math.max(64, word.length * charWidth + padding);
            canvas.height = 64;
            
            const ctx = canvas.getContext('2d');
            
            // Background
            ctx.fillStyle = '#f8f9fa';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Border / Shadow effect for depth
            ctx.strokeStyle = '#d1d8e0';
            ctx.lineWidth = 4;
            ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
            
            // Text
            ctx.fillStyle = '#2d3436';
            ctx.font = 'bold 36px "Inter", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // Slight organic offset
            const yOffset = (Math.random() - 0.5) * 2;
            const xOffset = (Math.random() - 0.5) * 2;
            ctx.fillText(word, canvas.width / 2 + xOffset, canvas.height / 2 + 2 + yOffset);

            const texture = new THREE.CanvasTexture(canvas);
            // Crisp text rendering
            texture.magFilter = THREE.NearestFilter;
            texture.minFilter = THREE.LinearMipMapLinearFilter;
            return { texture, width: canvas.width / 100 }; // Convert px to world units
        }

        function createSlamButtonTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            // Circular bg
            ctx.beginPath();
            ctx.arc(64, 64, 60, 0, 2 * Math.PI);
            ctx.fillStyle = '#ff4757';
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#c0392b';
            ctx.stroke();

            // Emoji/Text
            ctx.fillStyle = '#ffffff';
            ctx.font = '50px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🎭', 64, 68);

            return new THREE.CanvasTexture(canvas);
        }

        function createFridgeMagnets() {
            const doorWorldZ = 4 + 1.55 - 3.5; // (fridgeBody.y didn't apply to z) -> fridgeGroup Z + door Z + half depth
            const baseZ = -1.84; // Hardcoded after calculating offsets from fridge position (4,0,-3.5). Door local Z = 1.55. Total Z = -1.95. Plus 0.1 for door thickness = -1.85.

            // Shuffle words and pick ~35
            const shuffled = words.sort(() => 0.5 - Math.random()).slice(0, 35);
            
            shuffled.forEach((word) => {
                const { texture, width } = createWordTexture(word);
                
                // Thin box for magnet - SCALED DOWN
                const geo = new THREE.BoxGeometry(width * 0.5, 0.22, 0.05);
                const mat = new THREE.MeshStandardMaterial({ 
                    map: texture, 
                    roughness: 0.6,
                    metalness: 0.1,
                    color: 0xffffff
                });
                
                const mesh = new THREE.Mesh(geo, mat);
                
                // Random position on the upper half of the fridge door
                // Fridge width: 3.6, Height: 7.8. Door center is at Y=4. 
                const x = 4 + (Math.random() - 0.5) * 3; // Fridge X is 4. Range: 2.5 to 5.5
                const y = 4 + (Math.random() - 0.2) * 3; // Range: 3.4 to 7
                
                mesh.position.set(x, y, baseZ);
                
                // Slight random rotation for messy look
                mesh.rotation.z = (Math.random() - 0.5) * 0.2;
                
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                // Custom data for interaction
                mesh.userData = { 
                    isMagnet: true, 
                    word: word,
                    width: width * 0.5
                };
                
                scene.add(mesh);
                magnets.push(mesh);
            });

            // Create Poetry Slam Button - SCALED DOWN
            const slamTexture = createSlamButtonTexture();
            const slamGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.08, 32);
            // Rotate to face front
            slamGeo.rotateX(Math.PI / 2);
            const slamMat = new THREE.MeshStandardMaterial({ map: slamTexture, roughness: 0.4 });
            slamButton = new THREE.Mesh(slamGeo, slamMat);
            slamButton.position.set(5.2, 7.2, baseZ);
            slamButton.castShadow = true;
            slamButton.userData = { isSlamButton: true };
            scene.add(slamButton);
            
            // Add a subtle pulsing animation to the slam button to draw attention
            gsap.to(slamButton.scale, {
                x: 1.05, y: 1.05, z: 1.05,
                duration: 1.5,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut"
            });
        }

        // --- STREAMING_CHUNK:Interaction Logic (Raycasting & Dragging)... ---
        function getIntersects(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            // Intersect magnets, slam button, and fridge door
            const objectsToTest = [...magnets, slamButton];
            if(fridgeDoorMesh) objectsToTest.push(fridgeDoorMesh);
            
            return raycaster.intersectObjects(objectsToTest);
        }

        function onPointerDown(event) {
            const intersects = getIntersects(event);

            if (intersects.length > 0) {
                const object = intersects[0].object;

                if (object.userData.isSlamButton) {
                    // Trigger poetry slam
                    triggerPoetrySlam();
                    
                    // Button press animation
                    gsap.to(object.position, { z: object.position.z - 0.04, duration: 0.1, yoyo: true, repeat: 1 });
                    controls.enabled = false; // prevent camera rotation during click
                } 
                else if (object.userData.isMagnet && isZoomedIn) {
                    // Start dragging
                    draggedMagnet = object;
                    controls.enabled = false;
                    document.body.style.cursor = 'grabbing';
                    
                    // Calculate offset between intersection point and object center
                    raycaster.ray.intersectPlane(dragPlane, dragOffset);
                    dragOffset.sub(draggedMagnet.position);

                    // Lift effect
                    gsap.to(draggedMagnet.position, { z: dragPlane.constant * -1 + 0.1, duration: 0.1 });
                    gsap.to(draggedMagnet.rotation, { z: 0, duration: 0.2 }); // Straighten when picking up
                    
                    // Bring to front
                    scene.remove(draggedMagnet);
                    scene.add(draggedMagnet);
                }
                else if (object.userData.isFridgeDoor && !isZoomedIn) {
                    // Zoom into fridge
                    zoomToFridge();
                }
            }
        }

        function onPointerMove(event) {
            if (!isZoomedIn) return; // Only allow drag/hover when zoomed in

            const intersects = getIntersects(event);
            
            // Cursor changing
            if (!draggedMagnet) {
                if (intersects.length > 0 && (intersects[0].object.userData.isMagnet || intersects[0].object.userData.isSlamButton)) {
                    document.body.style.cursor = 'pointer';
                } else {
                    document.body.style.cursor = 'default';
                }
            }

            // Drag logic
            if (draggedMagnet) {
                raycaster.setFromCamera(mouse, camera);
                const intersectPoint = new THREE.Vector3();
                raycaster.ray.intersectPlane(dragPlane, intersectPoint);
                
                // Update position (apply offset)
                let targetX = intersectPoint.x - dragOffset.x;
                let targetY = intersectPoint.y - dragOffset.y;
                
                // Constrain to fridge bounds roughly
                targetX = THREE.MathUtils.clamp(targetX, 2.5, 5.5);
                targetY = THREE.MathUtils.clamp(targetY, 0.5, 7.5);

                draggedMagnet.position.x = targetX;
                draggedMagnet.position.y = targetY;
            }
        }

        function onPointerUp(event) {
            if (draggedMagnet) {
                // Drop effect
                const dropZ = dragPlane.constant * -1 + 0.025; // 0.025 is half thickness
                
                gsap.to(draggedMagnet.position, { 
                    z: dropZ, 
                    duration: 0.2, 
                    ease: "power2.out" 
                });
                
                // Slight random rotation on drop for organic feel
                gsap.to(draggedMagnet.rotation, {
                    z: (Math.random() - 0.5) * 0.1,
                    duration: 0.2
                });

                draggedMagnet = null;
                document.body.style.cursor = 'default';
            }
            controls.enabled = true; // Re-enable orbit/pan controls so you can look around the fridge
        }

        // --- STREAMING_CHUNK:Camera Navigation... ---
        function zoomToFridge() {
            if (isZoomedIn) return;
            isZoomedIn = true;
            controls.enabled = false; // Disable temporarily while animating

            // Show UI
            document.getElementById('reset-view-btn').classList.remove('hidden');
            const instructions = document.getElementById('instructions');
            instructions.style.opacity = '1';
            setTimeout(() => { instructions.style.opacity = '0'; }, 5000);

            // Animate camera to look straight at the fridge door
            // Fridge center X = 4, Door Z = -1.85
            gsap.to(camera.position, {
                x: 4,
                y: 5,
                z: 3.5, // Pulled back slightly more to see the smaller pieces clearly
                duration: 1.5,
                ease: "power3.inOut",
                onComplete: () => { controls.enabled = true; } // Allow orbiting/panning after zoom completes
            });

            gsap.to(controls.target, {
                x: 4,
                y: 5,
                z: -1.85,
                duration: 1.5,
                ease: "power3.inOut"
            });
        }

        function resetCamera() {
            if (!isZoomedIn) return;
            isZoomedIn = false;
            controls.enabled = false; // Disable temporarily while animating

            // Hide UI
            document.getElementById('reset-view-btn').classList.add('hidden');

            gsap.to(camera.position, {
                x: 0,
                y: 4,
                z: 15,
                duration: 1.5,
                ease: "power3.inOut",
                onComplete: () => { controls.enabled = true; } // Re-enable after reset
            });

            gsap.to(controls.target, {
                x: 0,
                y: 3,
                z: 0,
                duration: 1.5,
                ease: "power3.inOut"
            });
        }

        // --- STREAMING_CHUNK:Procedural Poetry Generation and Animation... ---
        function triggerPoetrySlam() {
            // Templates to ensure somewhat legible but funny structures
            const templates = [
                ["the", "noun", "is", "adj"],
                ["I", "verb", "the", "noun", "in", "the", "noun"],
                ["adj", "noun", "verb", "with", "noun"],
                ["never", "verb", "a", "adj", "noun"],
                ["my", "noun", "is", "a", "adj", "noun"],
                ["why", "verb", "the", "noun"]
            ];

            // Categories for crude categorization based on word bank
            const categories = {
                noun: ["dog", "cat", "magic", "fridge", "snack", "dream", "shadow", "light", "coffee", "stars", "kitchen", "ghost", "time", "machine"],
                verb: ["love", "hate", "sleep", "dance", "whisper", "breathe"],
                adj: ["hot", "cold", "midnight", "slow", "fast", "beautiful", "broken"]
            };

            const template = templates[Math.floor(Math.random() * templates.length)];
            const selectedWords = [];

            // Pick words to fit template
            template.forEach(type => {
                if (categories[type]) {
                    // Pick random from category
                    const catWords = categories[type];
                    const targetWord = catWords[Math.floor(Math.random() * catWords.length)];
                    // Find mesh
                    const mesh = magnets.find(m => m.userData.word === targetWord && !selectedWords.includes(m));
                    if (mesh) selectedWords.push(mesh);
                } else {
                    // Exact word match
                    const mesh = magnets.find(m => m.userData.word === type && !selectedWords.includes(m));
                    if (mesh) selectedWords.push(mesh);
                }
            });

            if (selectedWords.length === 0) return; // Fallback

            // Calculate target layout
            // Center them around (4, 5) on the fridge
            const startX = 2.8; 
            const targetY = 5 + (Math.random() - 0.5); // Random height
            let currentX = startX;
            const dropZ = dragPlane.constant * -1 + 0.025;
            
            // "Unseen Hands" Animation
            selectedWords.forEach((mesh, index) => {
                // Determine target X based on cumulative width
                const targetX = currentX + (mesh.userData.width / 2);
                
                // The GSAP timeline for organic movement
                const tl = gsap.timeline({ delay: index * 0.2 }); // Staggered start
                
                // Lift off
                tl.to(mesh.position, { z: dropZ + 0.5, duration: 0.3, ease: "power2.out" }, 0)
                  .to(mesh.rotation, { z: (Math.random() - 0.5) * Math.PI, duration: 0.3 }, 0); // Wild spin

                // Swoop to position
                tl.to(mesh.position, { 
                    x: targetX, 
                    y: targetY, 
                    duration: 0.8, 
                    ease: "back.out(1.5)" 
                }, 0.3);
                
                tl.to(mesh.rotation, { 
                    z: (Math.random() - 0.5) * 0.1, // Settle mostly straight
                    duration: 0.5 
                }, 0.3);

                // Plunk down
                tl.to(mesh.position, { 
                    z: dropZ, 
                    duration: 0.2, 
                    ease: "bounce.out" 
                }, 1.1);

                // Advance X for next word, add small padding
                currentX += mesh.userData.width + 0.1; 
            });

            // Make non-selected words scatter slightly away from the center to make room
            magnets.forEach(mesh => {
                if (!selectedWords.includes(mesh)) {
                    // If it's near the target Y, push it up or down
                    if (Math.abs(mesh.position.y - targetY) < 0.8) {
                        const pushDir = mesh.position.y > targetY ? 1 : -1;
                        gsap.to(mesh.position, {
                            y: mesh.position.y + pushDir * (0.5 + Math.random()),
                            duration: 1.5,
                            ease: "power2.inOut"
                        });
                    }
                }
            });
        }

        // --- STREAMING_CHUNK:Render Loop... ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls.enabled) {
                controls.update(); // required if damping enabled
            }
            renderer.render(scene, camera);
        }

        // Boot
        init();

    </script>
</body>
</html>
